name: Build and Deploy

on:
  push:
    branches:
      - master

env:
  APP_VERSION: v1.0.${{ github.run_number }}

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4  # שודרג ל-v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4  # שודרג ל-v4
        with:
          java-version: '11'
          distribution: 'temurin'   # שונה ל-temurin כדי להתאים ל-Base Image החדש

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }} # תוקן ה-Typo מ-ACCESSE_TOKEN
        run: mvn clean package -DskipTests  # package עדיף ל-CI/CD מאשר install, והוספנו skipTests למניעת התרסקות

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3  # שודרג ל-v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3  # שודרג ל-v3

      - name: Login to DockerHub
        uses: docker/login-action@v3  # שודרג ל-v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5  # שודרג ל-v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ env.APP_VERSION }}

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_INSTANCE_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ec2-user/ops-basic-spring
            sudo docker compose down || true   # שינוי קטן: docker compose מודרני מגיע בלי מקף
            sed -i 's|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:v1.0.${{ github.run_number }}|g' /home/ec2-user/ops-basic-spring/docker-compose.yml
            sudo docker compose up -d || true
